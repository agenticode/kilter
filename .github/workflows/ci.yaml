name: CI
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version-file: go.mod}
      - name: gofmt
        run: test -z "$(gofmt -l . | grep -v '^tools/')"
      - name: go vet
        run: go vet ./...
      - name: unit tests (race)
        run: go test -race -count=1 ./...
      - name: benchmarks (sanity)
        run: go test -bench=. -benchtime=1x -run=NONE ./pkg/binpack/ ./pkg/histogram/
      - name: build all platforms
        run: |
          for os in linux darwin; do for arch in amd64 arm64; do
            CGO_ENABLED=0 GOOS=$os GOARCH=$arch go build -o /dev/null ./cmd/kilter
          done; done

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
      - name: helm lint + template
        run: |
          helm lint charts/kilter
          helm template test charts/kilter > /dev/null

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: {go-version-file: go.mod}
      - uses: helm/kind-action@v1
        with: {install_only: true}
      - name: end-to-end (kind)
        run: ./test/e2e/e2e.sh

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
