<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kilter — cluster cost optimization</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --line:#21262d; --fg:#e6edf3; --dim:#8b949e;
          --green:#3fb950; --yellow:#d29922; --red:#f85149; --cyan:#58a6ff; }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--bg); color:var(--fg); font:14px/1.5 ui-sans-serif,system-ui,sans-serif; }
  header { display:flex; align-items:center; gap:12px; padding:14px 22px; border-bottom:1px solid var(--line); }
  header h1 { font-size:17px; } header h1 span { color:var(--cyan); }
  header .right { margin-left:auto; display:flex; gap:8px; align-items:center; }
  select,input,button { background:var(--panel); color:var(--fg); border:1px solid var(--line);
    border-radius:6px; padding:6px 10px; font:inherit; }
  button { cursor:pointer; } button:hover { border-color:var(--cyan); }
  main { max-width:1180px; margin:0 auto; padding:20px 22px 60px; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:14px; margin:18px 0; }
  .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:16px 18px; }
  .card .label { color:var(--dim); font-size:12px; text-transform:uppercase; letter-spacing:.06em; }
  .card .value { font-size:26px; font-weight:700; margin-top:4px; }
  .card .sub { color:var(--dim); font-size:12px; margin-top:2px; }
  h2 { font-size:14px; margin:26px 0 10px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; }
  table { width:100%; border-collapse:collapse; background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
  th,td { text-align:left; padding:8px 12px; border-bottom:1px solid var(--line); font-size:13px; }
  th { color:var(--dim); font-weight:600; background:rgba(255,255,255,.02); }
  tr:last-child td { border-bottom:none; }
  .sev-critical { color:var(--red); font-weight:700; } .sev-warning { color:var(--yellow); }
  .sev-info { color:var(--cyan); } .green { color:var(--green); } .dim { color:var(--dim); }
  .empty { color:var(--dim); padding:14px; background:var(--panel); border:1px dashed var(--line); border-radius:10px; }
  #err { color:var(--red); padding:10px 0; display:none; }
  code { background:var(--bg); padding:1px 5px; border-radius:4px; font-size:12px; }
</style>
</head>
<body>
<header>
  <h1><span>◆</span> Kilter</h1>
  <div class="right">
    <select id="cluster"></select>
    <input id="token" type="password" placeholder="API token" size="14">
    <button id="refresh">Refresh</button>
  </div>
</header>
<main>
  <div id="err"></div>
  <div class="cards">
    <div class="card"><div class="label">Cluster cost</div><div class="value" id="c-hour">—</div><div class="sub" id="c-month"></div></div>
    <div class="card"><div class="label">Plan savings</div><div class="value green" id="c-save">—</div><div class="sub" id="c-savepct"></div></div>
    <div class="card"><div class="label">Recommendations</div><div class="value" id="c-recs">—</div><div class="sub">rightsizing candidates</div></div>
    <div class="card"><div class="label">Insights</div><div class="value" id="c-ins">—</div><div class="sub" id="c-insworst"></div></div>
    <div class="card"><div class="label">Realized savings</div><div class="value green" id="c-real">—</div><div class="sub" id="c-realmethod">measured, not claimed</div></div>
  </div>
  <h2>Insights</h2><div id="insights"></div>
  <h2>Rightsizing recommendations</h2><div id="recs"></div>
  <h2>Current plan</h2><div id="plan"></div>
  <h2>Audit ledger</h2><div id="ledger"></div>
</main>
<script>
"use strict";
const $ = id => document.getElementById(id);
const usd = v => "$" + v.toFixed(2);
const res = r => (r.milliCPU >= 1000 && r.milliCPU % 1000 === 0 ? r.milliCPU/1000 : r.milliCPU + "m")
  + "/" + (r.memoryBytes >= 1<<30 ? (r.memoryBytes/(1<<30)).toFixed(1) + "Gi" : Math.round(r.memoryBytes/(1<<20)) + "Mi");
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function api(path) {
  const headers = {};
  const tok = $("token").value || localStorage.getItem("kilter-token") || "";
  if (tok) { headers["Authorization"] = "Bearer " + tok; localStorage.setItem("kilter-token", tok); }
  const r = await fetch(path, { headers });
  if (!r.ok) throw new Error(path + " → " + r.status);
  return r.json();
}

function table(headers, rows) {
  if (!rows.length) return '<div class="empty">nothing to show</div>';
  return "<table><tr>" + headers.map(h => "<th>" + h + "</th>").join("") + "</tr>"
    + rows.map(r => "<tr>" + r.map(c => "<td>" + c + "</td>").join("") + "</tr>").join("") + "</table>";
}

async function loadClusters() {
  const d = await api("/api/v1/clusters");
  const sel = $("cluster");
  const cur = sel.value;
  sel.innerHTML = (d.clusters || []).map(c => `<option${c===cur?" selected":""}>${esc(c)}</option>`).join("");
}

async function load() {
  $("err").style.display = "none";
  try {
    await loadClusters();
    const cl = $("cluster").value;
    if (!cl) { $("err").textContent = "no clusters have reported yet — is an agent running?"; $("err").style.display = "block"; return; }
    const [cost, plan, recs, ins, ledger] = await Promise.all([
      api(`/api/v1/clusters/${encodeURIComponent(cl)}/cost`),
      api(`/api/v1/clusters/${encodeURIComponent(cl)}/plan`),
      api(`/api/v1/clusters/${encodeURIComponent(cl)}/recommendations`),
      api(`/api/v1/clusters/${encodeURIComponent(cl)}/insights`),
      api(`/api/v1/clusters/${encodeURIComponent(cl)}/ledger`),
    ]);
    $("c-hour").textContent = "$" + cost.hourlyUSD.toFixed(3) + "/h";
    $("c-month").textContent = usd(cost.monthlyUSD) + "/month · " + cost.nodes.length + " nodes";
    $("c-save").textContent = usd(plan.savingsMonthlyUSD || 0) + "/mo";
    $("c-savepct").textContent = plan.currentHourlyUSD ?
      Math.round(100 * (plan.currentHourlyUSD - plan.projectedHourlyUSD) / plan.currentHourlyUSD) + "% of node spend" : "";
    const recList = recs.recommendations || [];
    $("c-recs").textContent = recList.length;
    const insList = ins.insights || [];
    $("c-ins").textContent = insList.length;
    const worst = insList.find(i => i.severity === "critical") ? "critical findings!" :
                  insList.find(i => i.severity === "warning") ? "warnings present" : "all informational";
    $("c-insworst").textContent = insList.length ? worst : "cluster within learned norms";

    $("insights").innerHTML = table(["Severity","Kind","Target","Message"],
      insList.map(i => [
        `<span class="sev-${esc(i.severity)}">${esc(i.severity)}</span>`, esc(i.kind),
        esc(i.workload && i.workload.name ? i.workload.namespace + "/" + i.workload.name : (i.node || "cluster")),
        esc(i.message)]));

    $("recs").innerHTML = table(["Workload","Container","Class","Current","Target","Confidence"],
      recList.map(r => [
        esc(r.key.workload.namespace + "/" + r.key.workload.name), esc(r.key.container), esc(r.class || ""),
        res(r.currentRequest), `<span class="green">${res(r.targetRequest)}</span>`,
        Math.round(r.confidence * 100) + "%"]));

    const steps = plan.steps || [];
    $("plan").innerHTML = (plan.notes || []).map(n => `<div class="dim">· ${esc(n)}</div>`).join("")
      + table(["#","Action","Target","Detail","Risk"],
        steps.map(s => [s.seq, esc(s.type),
          esc(s.type === "resize-workload" ? s.workload.namespace + "/" + s.workload.name : (s.pod || s.node || "")),
          esc(s.detail), esc(s.risk)]));
    $("c-real").textContent = ledger.realizedMonthlyUSD ? usd(ledger.realizedMonthlyUSD) + "/mo" : "—";
    if (ledger.method) $("c-realmethod").title = ledger.method;
    const entries = ledger.entries || [];
    $("ledger").innerHTML = table(["When","Mode","Plan","Steps","Cost before","Projected","Claimed/mo"],
      entries.map(e => [
        new Date(e.at).toLocaleString(), esc(e.mode), `<code>${esc(e.fingerprint)}</code>`,
        e.done + " ok" + (e.failed ? ` <span class="sev-critical">${e.failed} failed</span>` : ""),
        "$" + e.costBeforeHourlyUSD.toFixed(3) + "/h", "$" + e.projectedHourlyUSD.toFixed(3) + "/h",
        `<span class="green">${usd(e.projectedMonthlySavings)}</span>`]));
  } catch (e) {
    $("err").textContent = e.message + " — check the API token";
    $("err").style.display = "block";
  }
}
$("refresh").onclick = load;
$("cluster").onchange = load;
$("token").value = localStorage.getItem("kilter-token") || "";
load();
setInterval(load, 30000);
</script>
</body>
</html>
